<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex">
  <title>Elm Tennis 2026</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      Elm.Main.init({
        node: document.querySelector('#tennis-app')
      })
    })
  </script>
</head>

<body>
  <main>
    <div class="outer">
      <div class="inner">
        <div class="content grid justify-items-center gap-1">
          <h1>🎾 Elm Tennis 2026</h1>
          <div id="tennis-app"></div>
        </div>
      </div>
    </div>
  </main>
</body>

</html>
